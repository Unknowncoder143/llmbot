<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin: 10px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .user {
      background: #238636;
      align-self: flex-end;
    }

    .bot {
      background: #161b22;
      border: 1px solid #30363d;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #30363d;
    }

    input {
      flex: 1;
      padding: 10px;
      background: #161b22;
      border: none;
      color: white;
    }

    button {
      padding: 10px 15px;
      background: #238636;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="message" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const API_KEY = "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"; // ⚠️ exposed

let messages = [];

function addMessage(text, className) {
  const div = document.createElement("div");
  div.className = "msg " + className;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("message");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  addMessage("You: " + text, "user");

  messages.push({ role: "user", content: text });

  addMessage("Bot is typing...", "bot");

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": "http://localhost",
        "X-Title": "Simple Chatbot"
      },
      body: JSON.stringify({
        model: "openai/gpt-4o-mini",
        messages: messages
      })
    });

    const data = await res.json();

    // remove "typing..."
    document.getElementById("chat").lastChild.remove();

    const reply = data.choices?.[0]?.message?.content || "Error";

    addMessage("Bot: " + reply, "bot");

    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    document.getElementById("chat").lastChild.remove();
    addMessage("Error: " + err.message, "bot");
  }
}

// Enter key support
document.getElementById("message").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
